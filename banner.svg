<svg width="800" height="200" viewBox="0 0 800 200"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">

  <defs>
    <style>
      @keyframes waveflag {
        0%   { transform: skewX(0deg)    scaleX(1);     }
        25%  { transform: skewX(1.2deg)  scaleX(1.010); }
        50%  { transform: skewX(0deg)    scaleX(1);     }
        75%  { transform: skewX(-1.2deg) scaleX(1.010); }
        100% { transform: skewX(0deg)    scaleX(1);     }
      }
      @keyframes pulse {
        0%, 100% { r: 70; }
        50%      { r: 74; }
      }
      @keyframes fadein {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0px);  }
      }
      @keyframes shimmer {
        0%, 100% { opacity: 0.06; }
        50%      { opacity: 0.13; }
      }
      .flagwave {
        transform-origin: 400px 100px;
        animation: waveflag 5s ease-in-out infinite;
      }
      .reddisc {
        transform-origin: 340px 100px;
        animation: pulse 4s ease-in-out infinite;
      }
      .t1 { animation: fadein 1.0s ease-out 0.3s both; }
      .t2 { animation: fadein 1.0s ease-out 0.7s both; }
      .t3 { animation: fadein 1.0s ease-out 1.1s both; }
      .bg_text { animation: shimmer 3.5s ease-in-out infinite; }
    </style>

    <clipPath id="roundclip">
      <rect x="0" y="0" width="800" height="200" rx="14" ry="14"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundclip)">

    <!-- ── Animated flag body ── -->
    <g class="flagwave">
      <!-- Green field -->
      <rect x="-20" y="-20" width="840" height="240" fill="#006A4E"/>

      <!-- Subtle texture stripes -->
      <line x1="-20" y1="0"   x2="840" y2="0"   stroke="rgba(0,80,50,0.4)" stroke-width="40"/>
      <line x1="-20" y1="80"  x2="840" y2="80"  stroke="rgba(0,80,50,0.25)" stroke-width="40"/>
      <line x1="-20" y1="160" x2="840" y2="160" stroke="rgba(0,80,50,0.3)" stroke-width="40"/>

      <!-- Red circle (flag-correct: slightly left of centre) -->
      <circle class="reddisc" cx="340" cy="100" r="70" fill="#F42A41"/>

      <!-- Soft inner highlight on red circle -->
      <circle cx="322" cy="84" r="24" fill="rgba(255,255,255,0.08)"/>
    </g>

    <!-- ── Right-side dark overlay for text legibility ── -->
    <rect x="420" y="0" width="380" height="200" fill="rgba(0,25,15,0.50)"/>

    <!-- ── Left edge vignette ── -->
    <rect x="0" y="0" width="100" height="200" fill="rgba(0,35,20,0.18)"/>

    <!-- ── Large ghosted Bangla text in background ── -->
    <text class="bg_text"
          x="400" y="122"
          text-anchor="middle"
          font-family="'Noto Sans Bengali', Arial, sans-serif"
          font-size="80" font-weight="700"
          fill="rgba(255,255,255,0.09)"
          letter-spacing="8">বাংলাদেশ</text>

    <!-- ── Title block (right side) ── -->

    <!-- Repo name -->
    <text class="t1"
          x="758" y="68"
          text-anchor="end"
          font-family="Arial, Helvetica, sans-serif"
          font-size="24" font-weight="700"
          fill="#FFFFFF">Bangladesh Administrative Data</text>

    <!-- Subtitle -->
    <text class="t2"
          x="758" y="98"
          text-anchor="end"
          font-family="Arial, Helvetica, sans-serif"
          font-size="13" font-weight="400"
          fill="rgba(255,255,255,0.82)">491 Upazilas · 767 Police Thanas · 22 Data Categories</text>

    <!-- Divider line -->
    <line class="t2"
          x1="462" y1="112" x2="758" y2="112"
          stroke="rgba(244,42,65,0.80)" stroke-width="1.5"/>

    <!-- Tag line -->
    <text class="t3"
          x="758" y="132"
          text-anchor="end"
          font-family="Arial, Helvetica, sans-serif"
          font-size="11" font-weight="400"
          fill="rgba(255,255,255,0.58)"
          letter-spacing="1.8">OPEN DATA  ·  CC0 LICENSE</text>

    <!-- ── Flagpole on left edge ── -->
    <rect x="20" y="14" width="3.5" height="174" fill="rgba(255,255,255,0.22)" rx="1"/>
    <circle cx="21.75" cy="14"  r="4" fill="rgba(255,255,255,0.28)"/>
    <circle cx="21.75" cy="188" r="4" fill="rgba(255,255,255,0.28)"/>

    <!-- ── Red accent bar at bottom ── -->
    <rect x="0" y="192" width="800" height="8" fill="#F42A41" opacity="0.90"/>
    <rect x="0" y="192" width="800" height="2" fill="rgba(255,255,255,0.18)"/>

  </g>
</svg>
