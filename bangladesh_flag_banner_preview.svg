<mask id="imagine-text-gaps-how6cs" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="716.54" height="306.84" fill="white"/><rect x="158.54855346679688" y="48.19947052001953" width="359.702880859375" height="84.00065612792969" fill="black" rx="2"/><rect x="280.5096740722656" y="49.99983596801758" width="359.4903869628906" height="28.800203323364258" fill="black" rx="2"/><rect x="331.1225891113281" y="88.99990844726562" width="308.8774719238281" height="18.400117874145508" fill="black" rx="2"/><rect x="461.2611083984375" y="124.3999252319336" width="178.73890686035156" height="16.00009822845459" fill="black" rx="2"/></mask></defs>

<g clip-path="url(#flagclip)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">

